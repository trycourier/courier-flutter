name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter-tests:
    name: Flutter tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate gitignored files from secrets
        env:
          COURIER_AUTH_KEY: ${{ secrets.COURIER_AUTH_KEY }}
          COURIER_CLIENT_KEY: ${{ secrets.COURIER_CLIENT_KEY }}
          COURIER_BRAND_ID: ${{ secrets.COURIER_BRAND_ID }}
          COURIER_PREFERENCE_TOPIC_ID: ${{ secrets.COURIER_PREFERENCE_TOPIC_ID }}
          FIREBASE_ANDROID_API_KEY: ${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SENDER_ID: ${{ secrets.FIREBASE_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_IOS_API_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
        run: |
          python3 << 'PY'
          import os, json

          def e(k):
              return os.environ.get(k, "")

          def q(k):
              return e(k).replace("\\", "\\\\").replace('"', '\\"')

          # env.dart
          env_src = (
              'class Env {\n'
              '  static const authKey = "' + q('COURIER_AUTH_KEY') + '";\n'
              '  static const clientKey = "' + q('COURIER_CLIENT_KEY') + '";\n'
              '  static const brandId = "' + q('COURIER_BRAND_ID') + '";\n'
              '  static const preferenceTopicId = "' + q('COURIER_PREFERENCE_TOPIC_ID') + '";\n'
              '}\n'
          )

          # firebase_options.dart
          firebase_src = (
              "// Generated by CI\n"
              "// ignore_for_file: type=lint\n"
              "import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;\n"
              "import 'package:flutter/foundation.dart'\n"
              "    show defaultTargetPlatform, kIsWeb, TargetPlatform;\n"
              "\n"
              "class DefaultFirebaseOptions {\n"
              "  static FirebaseOptions get currentPlatform {\n"
              "    if (kIsWeb) {\n"
              "      throw UnsupportedError(\n"
              "        'DefaultFirebaseOptions have not been configured for web - '\n"
              "        'you can reconfigure this by running the FlutterFire CLI again.',\n"
              "      );\n"
              "    }\n"
              "    switch (defaultTargetPlatform) {\n"
              "      case TargetPlatform.android:\n"
              "        return android;\n"
              "      case TargetPlatform.iOS:\n"
              "        return ios;\n"
              "      default:\n"
              "        throw UnsupportedError(\n"
              "          'DefaultFirebaseOptions are not supported for this platform.',\n"
              "        );\n"
              "    }\n"
              "  }\n"
              "\n"
              "  static const FirebaseOptions android = FirebaseOptions(\n"
              "    apiKey: '" + q("FIREBASE_ANDROID_API_KEY") + "',\n"
              "    appId: '" + q("FIREBASE_ANDROID_APP_ID") + "',\n"
              "    messagingSenderId: '" + q("FIREBASE_SENDER_ID") + "',\n"
              "    projectId: '" + q("FIREBASE_PROJECT_ID") + "',\n"
              "    storageBucket: '" + q("FIREBASE_STORAGE_BUCKET") + "',\n"
              "  );\n"
              "\n"
              "  static const FirebaseOptions ios = FirebaseOptions(\n"
              "    apiKey: '" + q("FIREBASE_IOS_API_KEY") + "',\n"
              "    appId: '" + q("FIREBASE_IOS_APP_ID") + "',\n"
              "    messagingSenderId: '" + q("FIREBASE_SENDER_ID") + "',\n"
              "    projectId: '" + q("FIREBASE_PROJECT_ID") + "',\n"
              "    storageBucket: '" + q("FIREBASE_STORAGE_BUCKET") + "',\n"
              "    iosBundleId: '" + q("FIREBASE_IOS_BUNDLE_ID") + "',\n"
              "  );\n"
              "}\n"
          )

          # google-services.json
          google_services = {
              "project_info": {
                  "project_number": e("FIREBASE_SENDER_ID"),
                  "project_id": e("FIREBASE_PROJECT_ID"),
                  "storage_bucket": e("FIREBASE_STORAGE_BUCKET"),
              },
              "client": [{
                  "client_info": {
                      "mobilesdk_app_id": e("FIREBASE_ANDROID_APP_ID"),
                      "android_client_info": {
                          "package_name": "com.courier.flutter_app"
                      }
                  },
                  "oauth_client": [],
                  "api_key": [{"current_key": e("FIREBASE_ANDROID_API_KEY")}],
                  "services": {
                      "appinvite_service": {"other_platform_oauth_client": []}
                  }
              }],
              "configuration_version": "1"
          }

          os.makedirs("example/lib", exist_ok=True)
          os.makedirs("example/android/app", exist_ok=True)
          open("example/lib/env.dart", "w").write(env_src)
          open("example/lib/firebase_options.dart", "w").write(firebase_src)
          open("example/android/app/google-services.json", "w").write(
              json.dumps(google_services, indent=2)
          )
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-boot-timeout: 300
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          working-directory: example
          script: flutter test integration_test/
