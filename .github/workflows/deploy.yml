name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_from_tag:
        description: "Run publish steps (must be a tag ref)"
        required: false
        default: "false"

jobs:
  tag-and-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Tag and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '[:space:]')
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping deploy."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist. Deploying."
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate CHANGELOG.md
        if: steps.check.outputs.deployed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "" > CHANGELOG.md

          LATEST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)
          if [ -n "$LATEST_TAG" ]; then
            CURRENT_ENTRIES=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            CURRENT_ENTRIES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "## $VERSION" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          if [ -n "$CURRENT_ENTRIES" ]; then
            echo "$CURRENT_ENTRIES" >> CHANGELOG.md
          else
            echo "- Release $VERSION" >> CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md

          for TAG in $(git tag --sort=-v:refname); do
            PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
            ENTRIES=$(git log "$PREV".."$TAG" --pretty=format:"- %s" --no-merges)
            echo "## $TAG" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            if [ -n "$ENTRIES" ]; then
              echo "$ENTRIES" >> CHANGELOG.md
            else
              echo "- Release $TAG" >> CHANGELOG.md
            fi
            echo "" >> CHANGELOG.md
          done

      - name: Commit CHANGELOG.md
        if: steps.check.outputs.deployed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for ${{ steps.check.outputs.version }} [skip ci]" || true
          git push origin HEAD:main

      - name: Create git tag
        if: steps.check.outputs.deployed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.check.outputs.deployed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          gh release create "$TAG" --generate-notes

      - name: Trigger publish
        if: steps.check.outputs.deployed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          gh workflow run deploy.yml --ref "$TAG" -f publish_from_tag=true

  publish:
    if: github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' && inputs.publish_from_tag == 'true'
    name: Publish to pub.dev
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
