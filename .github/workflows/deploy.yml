name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deployed: ${{ steps.check.outputs.deployed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check version
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping deploy."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $VERSION does not exist. Deploying."
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.check.outputs.deployed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Generate release notes
        if: steps.check.outputs.deployed == 'true'
        id: notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          NOTES=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.deployed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          gh release create "$VERSION" --notes "${{ steps.notes.outputs.notes }}"

      - name: Set up pub token
        if: steps.check.outputs.deployed == 'true'
        env:
          PUB_TOKEN: ${{ secrets.PUB_TOKEN }}
        run: |
          mkdir -p ~/.config/dart
          echo "{\"version\":1,\"hosted\":[{\"url\":\"https://pub.dev\",\"token\":\"${PUB_TOKEN}\"}]}" > ~/.config/dart/pub-tokens.json

      - name: Publish to pub.dev
        if: steps.check.outputs.deployed == 'true'
        run: dart pub publish --force
