name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      publish_from_tag:
        description: "Run publish steps (must be a tag ref)"
        required: false
        default: "false"

jobs:
  tag-and-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Tag and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      deployed: ${{ steps.check.outputs.deployed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '[:space:]')
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping deploy."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist. Deploying."
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.check.outputs.deployed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.check.outputs.deployed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          gh release create "$TAG" --generate-notes --notes-start-tag "$PREVIOUS_TAG"

      - name: Trigger publish run on tag
        if: steps.check.outputs.deployed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          gh workflow run ".github/workflows/deploy.yml" --ref "$TAG" -f publish_from_tag=true

  publish:
    name: Publish to pub.dev
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' && inputs.publish_from_tag == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5

      - name: Setup Dart (with OIDC token)
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4

      - name: Install dependencies
        run: dart pub get

      - name: Publish - dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
